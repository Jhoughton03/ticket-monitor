name: Players Era ticket monitor

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: state.json
          key: ticket-state-${{ github.run_id }}
          restore-keys: ticket-state-
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run monitor
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python players_era_monitor.py
